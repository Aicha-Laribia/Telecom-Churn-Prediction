<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Telecom Churn Predictor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
 
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
 
    header h1 {
      font-size: 2rem;
      color: #38bdf8;
      margin-bottom: 0.4rem;
    }
 
    header p {
      color: #94a3b8;
      font-size: 0.95rem;
    }
 
    .container {
      max-width: 820px;
      margin: 0 auto;
    }
 
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 1.8rem;
      margin-bottom: 1.5rem;
      border: 1px solid #334155;
    }
 
    .card h2 {
      font-size: 1rem;
      color: #38bdf8;
      margin-bottom: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
 
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
 
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
 
    .field label {
      display: block;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 0.3rem;
    }
 
    .field input,
    .field select {
      width: 100%;
      padding: 0.55rem 0.75rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      transition: border 0.2s;
    }
 
    .field input:focus,
    .field select:focus {
      outline: none;
      border-color: #38bdf8;
    }
 
    button {
      width: 100%;
      padding: 0.85rem;
      background: #38bdf8;
      color: #0f172a;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
 
    button:hover { background: #0ea5e9; }
    button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
 
    /* Result box */
    #result { display: none; }
 
    .result-inner {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
 
    .result-badge {
      font-size: 1.1rem;
      font-weight: 700;
      padding: 0.6rem 1.4rem;
      border-radius: 999px;
    }
 
    .badge-high    { background: #ef4444; color: #fff; }
    .badge-medium  { background: #f59e0b; color: #0f172a; }
    .badge-low     { background: #22c55e; color: #0f172a; }
 
    .result-stats { flex: 1; }
 
    .result-stats p {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 0.3rem;
    }
 
    .result-stats span { color: #e2e8f0; font-weight: 600; }
 
    .prob-bar-wrap {
      background: #0f172a;
      border-radius: 999px;
      height: 10px;
      margin-top: 0.6rem;
      overflow: hidden;
    }
 
    .prob-bar {
      height: 100%;
      border-radius: 999px;
      transition: width 0.6s ease;
    }
 
    .error-msg {
      color: #f87171;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }
  </style>
</head>
<body>
<header>
  <h1>📡 Telecom Churn Predictor</h1>
  <p>Enter customer details to predict churn probability</p>
</header>
 
<div class="container">
 
  <!-- Numeric fields -->
  <div class="card">
    <h2>Account Info</h2>
    <div class="grid">
      <div class="field">
        <label>Tenure (months)</label>
        <input type="number" id="tenure" value="12" min="0"/>
      </div>
      <div class="field">
        <label>Monthly Charges ($)</label>
        <input type="number" id="MonthlyCharges" value="65.5" step="0.01"/>
      </div>
      <div class="field">
        <label>Total Charges ($)</label>
        <input type="number" id="TotalCharges" value="786.0" step="0.01"/>
      </div>
      <div class="field">
        <label>Senior Citizen</label>
        <select id="SeniorCitizen">
          <option value="0">No</option>
          <option value="1">Yes</option>
        </select>
      </div>
    </div>
  </div>
 
  <!-- Personal -->
  <div class="card">
    <h2>Personal</h2>
    <div class="grid">
      <div class="field">
        <label>Partner</label>
        <select id="Partner">
          <option>Yes</option><option>No</option>
        </select>
      </div>
      <div class="field">
        <label>Dependents</label>
        <select id="Dependents">
          <option>Yes</option><option>No</option>
        </select>
      </div>
    </div>
  </div>
 
  <!-- Services -->
  <div class="card">
    <h2>Services</h2>
    <div class="grid">
      <div class="field">
        <label>Multiple Lines</label>
        <select id="MultipleLines">
          <option>No</option>
          <option>Yes</option>
          <option>No phone service</option>
        </select>
      </div>
      <div class="field">
        <label>Internet Service</label>
        <select id="InternetService">
          <option>Fiber optic</option>
          <option>DSL</option>
          <option>No</option>
        </select>
      </div>
      <div class="field">
        <label>Online Security</label>
        <select id="OnlineSecurity">
          <option>No</option>
          <option>Yes</option>
          <option>No internet service</option>
        </select>
      </div>
      <div class="field">
        <label>Online Backup</label>
        <select id="OnlineBackup">
          <option>No</option>
          <option>Yes</option>
          <option>No internet service</option>
        </select>
      </div>
      <div class="field">
        <label>Device Protection</label>
        <select id="DeviceProtection">
          <option>No</option>
          <option>Yes</option>
          <option>No internet service</option>
        </select>
      </div>
      <div class="field">
        <label>Tech Support</label>
        <select id="TechSupport">
          <option>No</option>
          <option>Yes</option>
          <option>No internet service</option>
        </select>
      </div>
      <div class="field">
        <label>Streaming TV</label>
        <select id="StreamingTV">
          <option>No</option>
          <option>Yes</option>
          <option>No internet service</option>
        </select>
      </div>
      <div class="field">
        <label>Streaming Movies</label>
        <select id="StreamingMovies">
          <option>No</option>
          <option>Yes</option>
          <option>No internet service</option>
        </select>
      </div>
    </div>
  </div>
 
  <!-- Contract -->
  <div class="card">
    <h2>Contract & Billing</h2>
    <div class="grid">
      <div class="field">
        <label>Contract</label>
        <select id="Contract">
          <option>Month-to-month</option>
          <option>One year</option>
          <option>Two year</option>
        </select>
      </div>
      <div class="field">
        <label>Paperless Billing</label>
        <select id="PaperlessBilling">
          <option>Yes</option><option>No</option>
        </select>
      </div>
      <div class="field" style="grid-column: span 2">
        <label>Payment Method</label>
        <select id="PaymentMethod">
          <option>Electronic check</option>
          <option>Mailed check</option>
          <option>Bank transfer (automatic)</option>
          <option>Credit card (automatic)</option>
        </select>
      </div>
    </div>
  </div>
 
  <!-- Button -->
  <button id="predictBtn" onclick="predict()">🔍 Predict Churn</button>
  <p class="error-msg" id="errorMsg"></p>
 
  <!-- Result -->
  <div class="card" id="result" style="margin-top:1.5rem">
    <h2>Prediction Result</h2>
    <div class="result-inner">
      <div class="result-badge" id="badge"></div>
      <div class="result-stats">
        <p>Churn Probability: <span id="probText"></span></p>
        <p>Decision: <span id="decisionText"></span></p>
        <p>Risk Level: <span id="riskText"></span></p>
        <div class="prob-bar-wrap">
          <div class="prob-bar" id="probBar"></div>
        </div>
      </div>
    </div>
  </div>
 
</div>
 
<script>
  async function predict() {
    const btn = document.getElementById('predictBtn');
    const errMsg = document.getElementById('errorMsg');
    btn.disabled = true;
    btn.textContent = 'Predicting...';
    errMsg.style.display = 'none';
 
    const payload = {
      tenure:           parseFloat(document.getElementById('tenure').value),
      MonthlyCharges:   parseFloat(document.getElementById('MonthlyCharges').value),
      TotalCharges:     parseFloat(document.getElementById('TotalCharges').value),
      SeniorCitizen:    parseInt(document.getElementById('SeniorCitizen').value),
      Partner:          document.getElementById('Partner').value,
      Dependents:       document.getElementById('Dependents').value,
      MultipleLines:    document.getElementById('MultipleLines').value,
      InternetService:  document.getElementById('InternetService').value,
      OnlineSecurity:   document.getElementById('OnlineSecurity').value,
      OnlineBackup:     document.getElementById('OnlineBackup').value,
      DeviceProtection: document.getElementById('DeviceProtection').value,
      TechSupport:      document.getElementById('TechSupport').value,
      StreamingTV:      document.getElementById('StreamingTV').value,
      StreamingMovies:  document.getElementById('StreamingMovies').value,
      Contract:         document.getElementById('Contract').value,
      PaperlessBilling: document.getElementById('PaperlessBilling').value,
      PaymentMethod:    document.getElementById('PaymentMethod').value,
    };
 
    try {
      const res  = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
 
      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();
      showResult(data);
    } catch (err) {
      errMsg.textContent = '❌ ' + err.message;
      errMsg.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = '🔍 Predict Churn';
    }
  }
 
  function showResult(data) {
    const prob     = data.churn_probability;
    const risk     = data.risk_level;
    const churns   = data.churn_prediction;
 
    // Badge
    const badge = document.getElementById('badge');
    badge.textContent = risk + ' Risk';
    badge.className   = 'result-badge badge-' + risk.toLowerCase();
 
    // Stats
    document.getElementById('probText').textContent     = (prob * 100).toFixed(1) + '%';
    document.getElementById('decisionText').textContent = churns ? '⚠️ Likely to Churn' : '✅ Likely to Stay';
    document.getElementById('riskText').textContent     = risk;
 
    // Bar
    const bar   = document.getElementById('probBar');
    bar.style.width      = (prob * 100) + '%';
    bar.style.background = risk === 'High' ? '#ef4444' : risk === 'Medium' ? '#f59e0b' : '#22c55e';
 
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
  }
</script>
</body>
</html>
