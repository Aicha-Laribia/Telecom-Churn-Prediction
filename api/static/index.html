<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Telecom Churn Predictor</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      /* Soft Gradient Background - Professional & Not Boring */
      background: radial-gradient(circle at top right, #f0f4ff, #e5e7eb);
      color: #1e293b;
      min-height: 100vh;
      padding: 2.5rem 1.5rem;
    }
 
    header {
      text-align: center;
      margin-bottom: 3rem;
    }
 
    header h1 {
      font-size: 2.2rem;
      color: #1e3a8a; /* Deep Telecom Blue */
      font-weight: 800;
      letter-spacing: -0.025em;
      margin-bottom: 0.5rem;
    }
 
    header p {
      color: #64748b; /* Slate Gray */
      font-size: 1rem;
      font-weight: 500;
    }
 
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
 
    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 2.5rem;
      margin-bottom: 1.5rem;
      /* Subtle shadow instead of harsh borders */
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 
                  0 8px 10px -6px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(226, 232, 240, 0.8);
    }
 
    .card h2 {
      font-size: 0.9rem;
      color: #3b82f6; /* Electric Blue */
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card h2::after {
      content: "";
      height: 1px;
      flex-grow: 1;
      background: #e2e8f0;
    }
 
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
 
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
 
    .field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 0.5rem;
    }
 
    .field input,
    .field select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      color: #1e293b;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }
 
    .field input:focus,
    .field select:focus {
      outline: none;
      border-color: #3b82f6;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }
 
    button {
      width: 100%;
      padding: 1rem;
      background: #1e3a8a; /* Deep Navy */
      color: #ffffff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
      box-shadow: 0 4px 6px -1px rgba(30, 58, 138, 0.2);
    }
 
    button:hover { 
      background: #2563eb; 
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
    }
 
    /* Result box - Professional "Toast" style */
    #result { 
        display: none; 
        animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
 
    .result-badge {
      font-size: 1rem;
      font-weight: 700;
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
    }
 
    .badge-high   { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
    .badge-medium { background: #fef3c7; color: #d97706; border: 1px solid #fde68a; }
    .badge-low    { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
 
    .prob-bar-wrap {
      background: #f1f5f9;
      border-radius: 8px;
      height: 12px;
      margin-top: 0.8rem;
      overflow: hidden;
    }
 
    .prob-bar {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
</style>
</head>
<body>
<header>
  <h1>Telecom Churn Predictor</h1>
  <p>Enter customer details to predict churn probability</p>
</header>
 
<div class="container">
 
  <!-- Numeric fields -->
  <div class="card">
    <h2>Account Info</h2>
    <div class="grid">
      <div class="field">
        <label>Tenure (months)</label>
        <input type="number" id="tenure" value="12" min="0"/>
      </div>
      <div class="field">
        <label>Monthly Charges ($)</label>
        <input type="number" id="MonthlyCharges" value="65.5" step="0.01"/>
      </div>
      <div class="field">
        <label>Total Charges ($)</label>
        <input type="number" id="TotalCharges" value="786.0" step="0.01"/>
      </div>
      <div class="field">
        <label>Senior Citizen</label>
        <select id="SeniorCitizen">
          <option value="0">No</option>
          <option value="1">Yes</option>
        </select>
      </div>
    </div>
  </div>
 
  <!-- Personal -->
  <div class="card">
    <h2>Personal</h2>
    <div class="grid">
      <div class="field">
        <label>Partner</label>
        <select id="Partner">
          <option>Yes</option><option>No</option>
        </select>
      </div>
      <div class="field">
        <label>Dependents</label>
        <select id="Dependents">
          <option>Yes</option><option>No</option>
        </select>
      </div>
    </div>
  </div>
 
  <!-- Services -->
  <div class="card">
    <h2>Services</h2>
    <div class="grid">
      <div class="field">
        <label>Multiple Lines</label>
        <select id="MultipleLines">
          <option>No</option>
          <option>Yes</option>
          <option>No phone service</option>
        </select>
      </div>
      <div class="field">
        <label>Internet Service</label>
        <select id="InternetService">
          <option>Fiber optic</option>
          <option>DSL</option>
          <option>No</option>
        </select>
      </div>
      <div class="field">
        <label>Online Security</label>
        <select id="OnlineSecurity">
          <option>No</option>
          <option>Yes</option>
          <option>No internet service</option>
        </select>
      </div>
      <div class="field">
        <label>Online Backup</label>
        <select id="OnlineBackup">
          <option>No</option>
          <option>Yes</option>
          <option>No internet service</option>
        </select>
      </div>
      <div class="field">
        <label>Device Protection</label>
        <select id="DeviceProtection">
          <option>No</option>
          <option>Yes</option>
          <option>No internet service</option>
        </select>
      </div>
      <div class="field">
        <label>Tech Support</label>
        <select id="TechSupport">
          <option>No</option>
          <option>Yes</option>
          <option>No internet service</option>
        </select>
      </div>
      <div class="field">
        <label>Streaming TV</label>
        <select id="StreamingTV">
          <option>No</option>
          <option>Yes</option>
          <option>No internet service</option>
        </select>
      </div>
      <div class="field">
        <label>Streaming Movies</label>
        <select id="StreamingMovies">
          <option>No</option>
          <option>Yes</option>
          <option>No internet service</option>
        </select>
      </div>
    </div>
  </div>
 
  <!-- Contract -->
  <div class="card">
    <h2>Contract & Billing</h2>
    <div class="grid">
      <div class="field">
        <label>Contract</label>
        <select id="Contract">
          <option>Month-to-month</option>
          <option>One year</option>
          <option>Two year</option>
        </select>
      </div>
      <div class="field">
        <label>Paperless Billing</label>
        <select id="PaperlessBilling">
          <option>Yes</option><option>No</option>
        </select>
      </div>
      <div class="field" style="grid-column: span 2">
        <label>Payment Method</label>
        <select id="PaymentMethod">
          <option>Electronic check</option>
          <option>Mailed check</option>
          <option>Bank transfer (automatic)</option>
          <option>Credit card (automatic)</option>
        </select>
      </div>
    </div>
  </div>
 
  <!-- Button -->
  <button id="predictBtn" onclick="predict()">🔍 Predict Churn</button>
  <p class="error-msg" id="errorMsg"></p>
 
  <!-- Result -->
  <div class="card" id="result" style="margin-top:1.5rem">
    <h2>Prediction Result</h2>
    <div class="result-inner">
      <div class="result-badge" id="badge"></div>
      <div class="result-stats">
        <p>Churn Probability: <span id="probText"></span></p>
        <p>Decision: <span id="decisionText"></span></p>
        <p>Risk Level: <span id="riskText"></span></p>
        <div class="prob-bar-wrap">
          <div class="prob-bar" id="probBar"></div>
        </div>
      </div>
    </div>
  </div>
 
</div>
 
<script>
  async function predict() {
    const btn = document.getElementById('predictBtn');
    const errMsg = document.getElementById('errorMsg');
    btn.disabled = true;
    btn.textContent = 'Predicting...';
    errMsg.style.display = 'none';
 
    const payload = {
      tenure:           parseFloat(document.getElementById('tenure').value),
      MonthlyCharges:   parseFloat(document.getElementById('MonthlyCharges').value),
      TotalCharges:     parseFloat(document.getElementById('TotalCharges').value),
      SeniorCitizen:    parseInt(document.getElementById('SeniorCitizen').value),
      Partner:          document.getElementById('Partner').value,
      Dependents:       document.getElementById('Dependents').value,
      MultipleLines:    document.getElementById('MultipleLines').value,
      InternetService:  document.getElementById('InternetService').value,
      OnlineSecurity:   document.getElementById('OnlineSecurity').value,
      OnlineBackup:     document.getElementById('OnlineBackup').value,
      DeviceProtection: document.getElementById('DeviceProtection').value,
      TechSupport:      document.getElementById('TechSupport').value,
      StreamingTV:      document.getElementById('StreamingTV').value,
      StreamingMovies:  document.getElementById('StreamingMovies').value,
      Contract:         document.getElementById('Contract').value,
      PaperlessBilling: document.getElementById('PaperlessBilling').value,
      PaymentMethod:    document.getElementById('PaymentMethod').value,
    };
 
    try {
      const res  = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
 
      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();
      showResult(data);
    } catch (err) {
      errMsg.textContent = '❌ ' + err.message;
      errMsg.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = '🔍 Predict Churn';
    }
  }
 
  function showResult(data) {
    const prob     = data.churn_probability;
    const risk     = data.risk_level;
    const churns   = data.churn_prediction;
 
    // Badge
    const badge = document.getElementById('badge');
    badge.textContent = risk + ' Risk';
    badge.className   = 'result-badge badge-' + risk.toLowerCase();
 
    // Stats
    document.getElementById('probText').textContent     = (prob * 100).toFixed(1) + '%';
    document.getElementById('decisionText').textContent = churns ? '⚠️ Likely to Churn' : '✅ Likely to Stay';
    document.getElementById('riskText').textContent     = risk;
 
    // Bar
    const bar   = document.getElementById('probBar');
    bar.style.width      = (prob * 100) + '%';
    bar.style.background = risk === 'High' ? '#ef4444' : risk === 'Medium' ? '#f59e0b' : '#22c55e';
 
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
  }
</script>
</body>
</html>
